# --- Alarm Thresholds ---

[[alarms]]
channel_id = "OilP"
enabled = true
[alarms.thresholds]
low_warning = 1.5
low_critical = 1.0
deadband = 0.2

[[alarms]]
channel_id = "RPM"
enabled = true
[alarms.thresholds]
high_warning = 5800.0
high_critical = 6000.0
deadband = 100.0

