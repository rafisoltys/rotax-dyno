# Rotax Dyno DAQ - System Configuration
# Copy this file to ~/.rotax_dyno_daq/config.toml

[system]
csv_directory = "C:/Users/Rafal/dyno_data"
web_server_port = 8080
max_remote_connections = 3
dashboard_time_window_seconds = 60
disk_space_warning_mb = 50

# --- MCC 118 Channels (address 0, 8 analog inputs 0-7) ---
# Adjust channel assignments to match your wiring

[[channels]]
channel_id = "OilP"
channel_type = "pressure"
hat_address = 0
hat_channel = 0
sample_rate_hz = 10.0
display_name = "Oil Pressure"
enabled = true

[channels.calibration]
calibration_type = "linear"
unit_label = "bar"
min_valid_voltage = 0.5
max_valid_voltage = 4.5
[channels.calibration.linear_params]
slope = 2.5
offset = -1.25

[[channels]]
channel_id = "ChargeP"
channel_type = "pressure"
hat_address = 0
hat_channel = 1
sample_rate_hz = 10.0
display_name = "Charge Pressure"
enabled = true

[channels.calibration]
calibration_type = "linear"
unit_label = "kPa"
min_valid_voltage = 0.5
max_valid_voltage = 4.5
[channels.calibration.linear_params]
slope = 50.0
offset = -25.0

[[channels]]
channel_id = "RPM"
channel_type = "rpm"
hat_address = 0
hat_channel = 2
sample_rate_hz = 50.0
display_name = "Engine RPM"
enabled = true

[channels.calibration]
calibration_type = "linear"
unit_label = "RPM"
min_valid_voltage = 0.2
