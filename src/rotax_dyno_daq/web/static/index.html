<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotax Dyno DAQ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; color: #222; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 10px; }
.dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto; gap: 10px; max-width: 900px; width: 100%; }
.panel { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.cyl-panel { display: flex; flex-direction: column; gap: 8px; }
.cyl-title { font-size: 14px; color: #666; font-weight: 600; }
.gauge-row { display: flex; align-items: center; gap: 8px; }
.gauge-label { font-size: 14px; font-weight: 700; min-width: 35px; }
.bar-egt { width: 20px; height: 18px; background: #d32f2f; border-radius: 2px; }
.bar-afr { width: 6px; height: 22px; background: #1565c0; border-radius: 2px; }
.gauge-value { font-size: 22px; font-weight: 700; }
.gauge-value.egt { color: #222; }
.gauge-value.afr { color: #222; }

.oil-panel { display: flex; flex-direction: column; align-items: center; }
.oil-title { font-size: 14px; color: #666; font-weight: 600; margin-bottom: 5px; }
.oil-gauges { display: flex; gap: 20px; align-items: flex-end; height: 120px; }
.oil-bar-container { display: flex; flex-direction: column; align-items: center; }
.oil-bar-label { font-size: 12px; color: #666; margin-bottom: 4px; }
.oil-bar { width: 24px; height: 100px; background: #eee; border-radius: 4px; position: relative; overflow: hidden; }
.oil-bar-fill { position: absolute; bottom: 0; width: 100%; border-radius: 4px; transition: height 0.3s; }
.oil-bar-fill.temp { background: #d32f2f; }
.oil-bar-fill.press { background: #6d4c00; }
.oil-bar-value { font-size: 16px; font-weight: 700; margin-top: 4px; }

.rpm-row { grid-column: 1 / -1; display: flex; align-items: center; justify-content: center; gap: 20px; }
.arc-gauge { width: 100px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.arc-gauge svg { width: 90px; height: 90px; }
.arc-label { font-size: 11px; color: #666; margin-top: 2px; }
.arc-value { font-size: 18px; font-weight: 700; color: #1565c0; }
.rpm-display { text-align: center; }
.rpm-value { font-size: 64px; font-weight: 900; color: #d32f2f; line-height: 1; }
.rpm-unit { font-size: 20px; color: #666; font-weight: 400; }

.bottom-row { grid-column: 1 / -1; display: flex; justify-content: center; gap: 40px; padding: 10px; }
.temp-gauge { display: flex; align-items: center; gap: 8px; }
.temp-label { font-size: 14px; font-weight: 600; color: #666; }
.temp-bar { width: 12px; height: 50px; background: #e3f2fd; border-radius: 6px; position: relative; overflow: hidden; }
.temp-bar-fill { position: absolute; bottom: 0; width: 100%; background: #1565c0; border-radius: 6px; transition: height 0.3s; }
.temp-value { font-size: 18px; font-weight: 700; }

.status-bar { width: 100%; max-width: 900px; display: flex; justify-content: space-between; padding: 8px 0; font-size: 12px; color: #666; }
.disconnected-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; }
.disconnected-overlay.show { display: flex; }
.disconnected-msg { background: #d32f2f; color: white; padding: 20px 40px; border-radius: 8px; font-size: 18px; }
.stale .gauge-value, .stale .oil-bar-value, .stale .rpm-value, .stale .temp-value, .stale .arc-value { color: #999 !important; }
</style>
</head>
<body>
<div class="status-bar">
<span id="connectionStatus">Connecting...</span>
<span id="lastUpdate">Last update: --</span>
</div>

<div class="dashboard">
<!-- Cyl 1 -->
<div class="panel cyl-panel" id="cyl1">
<div class="cyl-title">Cyl. 1</div>
<div class="gauge-row"><span class="gauge-label">EGT</span><div class="bar-egt"></div><span class="gauge-value egt" id="v-EGT1">---</span></div>
<div class="gauge-row"><span class="gauge-label">AFR</span><div class="bar-afr"></div><span class="gauge-value afr" id="v-AFR1">---</span></div>
</div>

<!-- OIL -->
<div class="panel oil-panel">
<div class="oil-title">OIL</div>
<div class="oil-gauges">
<div class="oil-bar-container">
<div class="oil-bar-label">°C</div>
<div class="oil-bar"><div class="oil-bar-fill temp" id="bar-OILT" style="height:0%"></div></div>
<div class="oil-bar-value" id="v-OILT">---</div>
</div>
<div class="oil-bar-container">
<div class="oil-bar-label">bar</div>
<div class="oil-bar"><div class="oil-bar-fill press" id="bar-OILP" style="height:0%"></div></div>
<div class="oil-bar-value" id="v-OILP">---</div>
</div>
</div>
</div>

<!-- Cyl 3 -->
<div class="panel cyl-panel" id="cyl3">
<div class="cyl-title">Cyl. 3</div>
<div class="gauge-row"><span class="gauge-label">EGT</span><div class="bar-egt"></div><span class="gauge-value egt" id="v-EGT3">---</span></div>
<div class="gauge-row"><span class="gauge-label">AFR</span><div class="bar-afr"></div><span class="gauge-value afr" id="v-AFR3">---</span></div>
</div>

<!-- Cyl 2 -->
<div class="panel cyl-panel" id="cyl2">
<div class="cyl-title">Cyl. 2</div>
<div class="gauge-row"><span class="gauge-label">EGT</span><div class="bar-egt"></div><span class="gauge-value egt" id="v-EGT2">---</span></div>
<div class="gauge-row"><span class="gauge-label">AFR</span><div class="bar-afr"></div><span class="gauge-value afr" id="v-AFR2">---</span></div>
</div>

<!-- Empty center -->
<div></div>

<!-- Cyl 4 -->
<div class="panel cyl-panel" id="cyl4">
<div class="cyl-title">Cyl. 4</div>
<div class="gauge-row"><span class="gauge-label">EGT</span><div class="bar-egt"></div><span class="gauge-value egt" id="v-EGT4">---</span></div>
<div class="gauge-row"><span class="gauge-label">AFR</span><div class="bar-afr"></div><span class="gauge-value afr" id="v-AFR4">---</span></div>
</div>

<!-- RPM row -->
<div class="panel rpm-row">
<div class="arc-gauge">
<svg viewBox="0 0 100 100"><path d="M20 80 A40 40 0 1 1 80 80" fill="none" stroke="#ddd" stroke-width="8" stroke-linecap="round"/><path id="arc-power" d="M20 80 A40 40 0 0 1 50 20" fill="none" stroke="#1565c0" stroke-width="8" stroke-linecap="round"/></svg>
<div class="arc-value" id="v-Power">0%</div>
<div class="arc-label">Power</div>
</div>
<div class="rpm-display">
<span class="rpm-value" id="v-RPM">0</span><span class="rpm-unit"> RPM</span>
</div>
<div class="arc-gauge">
<svg viewBox="0 0 100 100"><path d="M20 80 A40 40 0 1 1 80 80" fill="none" stroke="#ddd" stroke-width="8" stroke-linecap="round"/><path id="arc-throttle" d="M20 80 A40 40 0 0 1 50 20" fill="none" stroke="#1565c0" stroke-width="8" stroke-linecap="round"/></svg>
<div class="arc-value" id="v-Throttle">0%</div>
<div class="arc-label">Throttle</div>
</div>
</div>

<!-- Bottom: IAT + CLT -->
<div class="panel bottom-row">
<div class="temp-gauge">
<span class="temp-label">IAT</span>
<div class="temp-bar"><div class="temp-bar-fill" id="bar-IAT" style="height:0%"></div></div>
<span class="temp-value" id="v-IAT">---</span><span>°C</span>
</div>
<div class="temp-gauge">
<span class="temp-label">CLT</span>
<div class="temp-bar"><div class="temp-bar-fill" id="bar-CLT" style="height:0%"></div></div>
<span class="temp-value" id="v-CLT">---</span><span>°C</span>
</div>
</div>
</div>

<div class="disconnected-overlay" id="disconnectedOverlay">
<div class="disconnected-msg">Connection Lost — Reconnecting...</div>
</div>

<script>
const STALE_MS = 3000;
const RECONNECT_MS = 5000;
let ws = null;
let lastData = {};
let lastUpdateTime = 0;

function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/live');
    ws.onopen = () => {
        document.getElementById('connectionStatus').textContent = 'Connected';
        document.getElementById('disconnectedOverlay').classList.remove('show');
    };
    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.channels) { updateDashboard(msg.channels); }
        lastUpdateTime = Date.now();
        document.getElementById('lastUpdate').textContent = 'Last update: ' + new Date().toLocaleTimeString();
    };
    ws.onclose = () => {
        document.getElementById('connectionStatus').textContent = 'Disconnected';
        document.getElementById('disconnectedOverlay').classList.add('show');
        setTimeout(connect, RECONNECT_MS);
    };
    ws.onerror = () => { ws.close(); };
}

function updateDashboard(channels) {
    // Map channel names to display
    const map = {'EGT1':'EGT1','EGT2':'EGT2','EGT3':'EGT3','EGT4':'EGT4',
                 'AFR1':'AFR1','AFR2':'AFR2','AFR3':'AFR3','AFR4':'AFR4',
                 'OilTemp':'OILT','OILT':'OILT','OilP':'OILP','OILP':'OILP',
                 'RPM':'RPM','IAT':'IAT','CLT':'CLT','ChargeP':'Charge','Charge':'Charge'};

    for (const [chId, data] of Object.entries(channels)) {
        const col = map[chId] || chId;
        const val = data.value;
        const el = document.getElementById('v-' + col);
        if (el) {
            if (col.startsWith('EGT')) el.textContent = Math.round(val);
            else if (col.startsWith('AFR')) el.textContent = val.toFixed(1);
            else if (col === 'RPM') el.textContent = Math.round(val);
            else if (col === 'OILT') el.textContent = Math.round(val);
            else if (col === 'OILP') el.textContent = val.toFixed(1);
            else if (col === 'IAT' || col === 'CLT') el.textContent = Math.round(val);
            else el.textContent = val.toFixed(1);
        }
        // Update bars
        if (col === 'OILT') { document.getElementById('bar-OILT').style.height = Math.min(val/150*100, 100) + '%'; }
        if (col === 'OILP') { document.getElementById('bar-OILP').style.height = Math.min(val/10*100, 100) + '%'; }
        if (col === 'IAT') { document.getElementById('bar-IAT').style.height = Math.min(val/60*100, 100) + '%'; }
        if (col === 'CLT') { document.getElementById('bar-CLT').style.height = Math.min(val/120*100, 100) + '%'; }
        // RPM -> Power% (proxy: RPM/5800*100)
        if (col === 'RPM') {
            const pct = Math.min(Math.round(val/5800*100), 100);
            document.getElementById('v-Power').textContent = pct + '%';
            updateArc('arc-power', pct);
        }
        // Charge -> Throttle%
        if (col === 'Charge') {
            const pct = Math.min(Math.round(val/2.5*100), 100);
            document.getElementById('v-Throttle').textContent = pct + '%';
            updateArc('arc-throttle', pct);
        }
    }
}

function updateArc(id, pct) {
    // SVG arc from 0-100%: sweep from bottom-left to proportional position
    const el = document.getElementById(id);
    if (!el) return;
    const angle = (pct / 100) * 240 - 120; // -120 to +120 degrees
    const rad = angle * Math.PI / 180;
    const cx = 50, cy = 50, r = 40;
    const startAngle = (150) * Math.PI / 180; // start at bottom-left
    const endAngle = startAngle - (pct / 100) * (4.19); // 240 degrees sweep
    const x1 = cx + r * Math.cos(startAngle);
    const y1 = cy + r * Math.sin(startAngle);
    const x2 = cx + r * Math.cos(startAngle - (pct/100)*4.19);
    const y2 = cy + r * Math.sin(startAngle - (pct/100)*4.19);
    const largeArc = pct > 50 ? 1 : 0;
    if (pct <= 0) { el.setAttribute('d', 'M0 0'); return; }
    el.setAttribute('d', `M${x1} ${y1} A${r} ${r} 0 ${largeArc} 0 ${x2} ${y2}`);
}

// Stale detection
setInterval(() => {
    if (Date.now() - lastUpdateTime > STALE_MS && lastUpdateTime > 0) {
        document.querySelector('.dashboard').classList.add('stale');
    } else {
        document.querySelector('.dashboard').classList.remove('stale');
    }
}, 1000);

connect();
</script>
</body>
</html>
